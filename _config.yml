# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title:       Anand's Blog
email:       anandbose16@gmail.com
description: Anand's Blog
baseurl:     '' # The subpath of your site, e.g. /blog
url:         'https://droidcrafts.github.io/' # The base hostname & protocol for your site
twitter:     'https://twitter.com/droidcrafts'
github:      'https://github.com/droidcrafts'
instagram:   ''
facebook:    ''
mastodon:    'https://mastodon.social/@anandbose'
pixelfed:    'https://pixelfed.social/@anandbose'

markdown:  kramdown
permalink: pretty
paginate:  10

sass:
  style: compressed

plugins:
  - jekyll-paginate
  - jekyll/tagging
  - jekyll-seo-tag
  - jekyll-sitemap

include:
  - _pages

exclude:
  - vendor
  - Gemfile
  - Gemfile.lock

# Tags
tag_page_dir:         tag
tag_page_layout:      tag_page
tag_permalink_style:  pretty

# Pages path
defaults:
  - scope:
      path: '_pages'
    values:
      permalink: /:basename:output_ext